kind = "web"
previewPath = "/"
title = "امتحانات توجيهي"
version = "1.0.0"
id = "artifacts/tawjihi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 26193
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/tawjihi run dev"

[services.env]
PORT = "26193"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/tawjihi", "run", "build"]
publicDir = "artifacts/tawjihi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
